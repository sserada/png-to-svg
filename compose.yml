version: '3'

services:
  its-frontend:
    container_name: 'its-frontend'
    build:
      context: ./frontend
      dockerfile: Dockerfile
    tty: true
    environment:
      - VITE_HOST=${IP}
      - VITE_BACKEND_PORT=${BACKEND_PORT}
    ports:
      - '${FRONTEND_PORT}:${FRONTEND_PORT}'
    volumes:
      - ./frontend:/home/app
    depends_on:
      - its-backend
    ulimits:
      core:
        hard: 0
        soft: 0
    command: sh -c 'npm install && npm run dev ${FRONTEND_PORT}'

  its-backend:
    build: ./backend
    container_name: 'its-backend'
    environment:
      - HOST=${IP}
      - PORT=${BACKEND_PORT}
      - FRONTEND_PORT=${FRONTEND_PORT}
    ports:
      - '${BACKEND_PORT}:${BACKEND_PORT}'
    volumes:
      - ./backend:/usr/src/app
    command: bash -c 'python main.py'
    restart: always

