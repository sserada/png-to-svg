services:
  its-frontend:
    container_name: 'its-frontend'
    build:
      context: ./frontend
      dockerfile: Dockerfile
    tty: true
    environment:
      - VITE_HOST=${IP}
      - VITE_BACKEND_PORT=${BACKEND_PORT}
    ports:
      - '${FRONTEND_PORT}:${FRONTEND_PORT}'
    volumes:
      - ./frontend:/home/app
    depends_on:
      its-backend:
        condition: service_healthy
    ulimits:
      core:
        hard: 0
        soft: 0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FRONTEND_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: sh -c 'npm install && npm run dev -- --port ${FRONTEND_PORT} --host'

  its-backend:
    build: ./backend
    container_name: 'its-backend'
    environment:
      - HOST=${IP}
      - PORT=${BACKEND_PORT}
      - FRONTEND_PORT=${FRONTEND_PORT}
    ports:
      - '${BACKEND_PORT}:${BACKEND_PORT}'
    volumes:
      - ./backend:/usr/src/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/backend/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: bash -c 'pip install -r requirements.txt && python main.py'
    restart: always
